<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 44 44" width="44" height="44">
  <!-- Background -->
  <rect width="44" height="44" fill="#080810" rx="8"/>

  <!-- Outer ring -->
  <circle cx="22" cy="22" r="20" stroke="#c8a850" stroke-width="0.8" stroke-opacity="0.5" fill="none"/>
  <!-- Inner ring -->
  <circle cx="22" cy="22" r="15" stroke="#c8a850" stroke-width="0.8" stroke-opacity="0.25" fill="none"/>

  <!-- Aperture blade lines (6 × 30°) -->
  <line x1="22" y1="7" x2="22" y2="37" stroke="#c8a850" stroke-width="0.5" stroke-opacity="0.3"/>
  <line x1="22" y1="7" x2="22" y2="37" stroke="#c8a850" stroke-width="0.5" stroke-opacity="0.3" transform="rotate(30 22 22)"/>
  <line x1="22" y1="7" x2="22" y2="37" stroke="#c8a850" stroke-width="0.5" stroke-opacity="0.3" transform="rotate(60 22 22)"/>
  <line x1="22" y1="7" x2="22" y2="37" stroke="#c8a850" stroke-width="0.5" stroke-opacity="0.3" transform="rotate(90 22 22)"/>
  <line x1="22" y1="7" x2="22" y2="37" stroke="#c8a850" stroke-width="0.5" stroke-opacity="0.3" transform="rotate(120 22 22)"/>
  <line x1="22" y1="7" x2="22" y2="37" stroke="#c8a850" stroke-width="0.5" stroke-opacity="0.3" transform="rotate(150 22 22)"/>

  <!-- N letterform -->
  <text x="22" y="28.5" text-anchor="middle"
    font-family="Georgia, 'Times New Roman', serif"
    font-weight="300" font-size="19"
    fill="#c8a850" letter-spacing="0">N</text>
</svg>
